<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-box { background: #2563eb; padding: 20px; border-radius: 8px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { color: #fbbf24; }
    </style>
</head>
<body>

    <h2>Admin Dashboard</h2>
    <div class="stats-grid">
        <div class="stat-box"><h3>Bukaanka Maanta</h3><p id="totalPatients">0</p></div>
        <div class="stat-box" style="background: #059669;"><h3>Dakhliga Maanta</h3><p id="dailyRevenue">$0</p></div>
    </div>

    <div class="card">
        <h3>Taariikhda Bukaannada</h3>
        <table>
            <thead><tr><th>Magaca</th><th>Dhakhtarka</th><th>Lacagta</th><th>Taariikhda</th></tr></thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('patient_history').on('value', (snap) => {
            const data = snap.val();
            let count = 0;
            let revenue = 0;
            const today = new Date().toLocaleDateString();
            const table = document.getElementById('historyTable');
            table.innerHTML = "";

            if (data) {
                Object.values(data).forEach(p => {
                    if (p.date === today) {
                        count++;
                        revenue += parseFloat(p.fee || 0);
                        table.innerHTML += `<tr><td>${p.name}</td><td>${p.doctor}</td><td>$${p.fee}</td><td>${p.time}</td></tr>`;
                    }
                });
                document.getElementById('totalPatients').innerText = count;
                document.getElementById('dailyRevenue').innerText = "$" + revenue;
            }
        });
    </script>
</body>
</html>
<style>
    :root {
        --primary: #6366f1;
        --secondary: #a855f7;
        --bg: #0f172a;
        --glass: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.1);
    }

    body {
        background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
        color: #f8fafc;
        font-family: 'Inter', sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 20px;
    }

    .glass-card {
        background: var(--glass);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 900px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h2 {
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 2rem;
        text-align: center;
        margin-bottom: 30px;
    }

    .section-title {
        color: #94a3b8;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin: 25px 0 15px;
        border-left: 4px solid var(--primary);
        padding-left: 10px;
    }

    input, textarea {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: white;
        padding: 14px;
        width: 100%;
        transition: all 0.3s ease;
    }

    input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .btn-action {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border: none;
        border-radius: 14px;
        color: white;
        padding: 18px;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
        margin-top: 30px;
        transition: transform 0.2s;
    }

    .btn-action:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
    }
</style>
